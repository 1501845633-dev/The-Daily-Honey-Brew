<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Honey-Brew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">

        <div class="ambient-layer" aria-hidden="true">
            <span class="firefly" style="--x:12%;--y:28%;--d:0s"></span>
            <span class="firefly" style="--x:78%;--y:18%;--d:1.2s"></span>
            <span class="firefly" style="--x:45%;--y:72%;--d:2.4s"></span>
            <span class="firefly" style="--x:88%;--y:55%;--d:0.8s"></span>
            <span class="firefly" style="--x:22%;--y:82%;--d:1.8s"></span>
        </div>
        <div class="bee-floaters" aria-hidden="true">
            <span class="mini-bee" style="--bx:70%;--by:22%;--bd:0s">🐝</span>
            <span class="mini-bee" style="--bx:82%;--by:38%;--bd:2s">🐝</span>
            <span class="mini-bee" style="--bx:55%;--by:15%;--bd:4s">🐝</span>
        </div>
        <div id="golden-rain" class="golden-rain" aria-hidden="true"></div>

        <div id="beehive-zone" class="beehive-zone" title="轻触蜂巢，听听八音盒～">
            <span class="click-hint click-hint--hive" aria-hidden="true"></span>
            <div class="hive-door" id="hive-door" aria-hidden="true"></div>
            <div class="music-particles" id="music-particles" aria-hidden="true">
                <span class="note-particle" style="--nx:20%;--nd:0s">♪</span>
                <span class="note-particle" style="--nx:45%;--nd:0.4s">♫</span>
                <span class="note-particle" style="--nx:70%;--nd:0.8s">♪</span>
                <span class="note-particle" style="--nx:35%;--nd:1.2s">♫</span>
                <span class="note-particle" style="--nx:55%;--nd:0.6s">♪</span>
                <span class="note-particle" style="--nx:80%;--nd:1.5s">♫</span>
            </div>
            <span class="zone-hint beehive-hint">🎵 八音盒蜂巢</span>
        </div>
        <div id="bee-messenger-layer" class="bee-messenger-layer" aria-hidden="true"></div>

        <div id="honey-label-zone" class="interactive-zone zone-honey" title="戳我抽夸夸！">
            <span class="click-hint click-hint--jar" aria-hidden="true"></span>
            <span class="zone-hint">✨ 戳戳罐子</span>
        </div>

        <div id="heart-door-zone" class="interactive-zone zone-door" title="敲敲门~">
            <span class="click-hint click-hint--door" aria-hidden="true"></span>
            <span class="zone-hint">🍯 茶饮铺</span>
        </div>

        <div id="signpost-zone" class="signpost-card">
            <span class="click-hint click-hint--sign" aria-hidden="true"></span>
            <div class="signpost-inner">
                <div class="signpost-front"></div>
                <div class="signpost-back">
                    <p class="task-title">🌻 今日航线 🌻</p>
                    <div id="task-list" class="task-list"></div>
                </div>
            </div>
        </div>

        <div id="street-lamp"></div>

        <div id="celebration-toast" class="celebration-toast" role="status">
            ✨ 今日航线圆满达成！好好今天也好好生活了～
        </div>

        <div class="bottom-title-badge" aria-label="网站名称">
            <span class="bottom-title-badge__deco" aria-hidden="true">🍯</span>
            <span class="bottom-title-badge__text">The Daily Honey-Brew</span>
            <span class="bottom-title-badge__deco" aria-hidden="true">🐝</span>
        </div>

    </div>

    <div id="fortune-modal" class="modal-overlay">
        <div class="modal-content bubble-pop">
            <p id="fortune-text">今天的好好也是 100% 甜度！</p>
            <button type="button" onclick="closeModal('fortune-modal')">收下甜味 ✨</button>
        </div>
    </div>

    <div id="door-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>🍯 好好疗愈茶饮铺</h3>
            <p>今天过得怎么样？把心思悄悄告诉小蜜蜂吧...</p>
            <textarea id="mood-input" placeholder="写点什么呢..."></textarea>
            <div class="mood-btns">
                <button type="button" onclick="brewTea('😊')">😊 开心</button>
                <button type="button" onclick="brewTea('😮‍💨')">😮‍💨 疲惫</button>
                <button type="button" onclick="brewTea('🥺')">🥺 焦虑</button>
            </div>
            <div id="tea-result" class="hidden">
                <hr>
                <p id="tea-delivery"></p>
                <button type="button" onclick="closeModal('door-modal')">暖呼呼地喝掉 🍵</button>
            </div>
        </div>
    </div>

    <audio id="music-box-audio" loop preload="auto" hidden>
        <source src="music-box.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
